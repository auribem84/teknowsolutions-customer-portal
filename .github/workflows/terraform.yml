name: "Terraform Infrastructure"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**' # Solo se activa si cambias la infraestructura
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    
    # YA NO necesitas la sección env: con las llaves de Render aquí
    # porque Terraform Cloud las maneja internamente.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # SOLO necesitas este token para autenticarte.
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: List Terraform files
        run: find . -name "*.tf" | sort

      - name: Terraform Plan
        run: terraform plan # -input=false
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform  